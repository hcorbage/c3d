<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Anel externo / cabeça -->
  <ellipse cx="60" cy="62" rx="46" ry="42" fill="#8aaa8a" />

  <!-- Cara / tela interna -->
  <ellipse cx="60" cy="64" rx="34" ry="31" fill="#0d1f18" />

  <!-- Olho esquerdo (acordado = círculo com brilho) -->
  <ellipse cx="47" cy="62" rx="7" ry="7" fill="#00e5cc" />
  <ellipse cx="44.5" cy="59.5" rx="2" ry="2" fill="#ffffff" opacity="0.6" />

  <!-- Olho direito (acordado = círculo com brilho) -->
  <ellipse cx="73" cy="62" rx="7" ry="7" fill="#00e5cc" />
  <ellipse cx="70.5" cy="59.5" rx="2" ry="2" fill="#ffffff" opacity="0.6" />

  <!-- Antena central (topo) -->
  <line x1="60" y1="20" x2="60" y2="36" stroke="#8aaa8a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="17" r="5" fill="#8aaa8a" />

  <!-- Antena esquerda -->
  <path d="M24 58 Q16 46 14 40" stroke="#8aaa8a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="13" cy="38" r="4" fill="#8aaa8a" />

  <!-- Antena direita -->
  <path d="M96 58 Q104 46 106 40" stroke="#8aaa8a" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="107" cy="38" r="4" fill="#8aaa8a" />

  <!-- Brilho sutil no anel -->
  <ellipse cx="60" cy="62" rx="46" ry="42" fill="url(#ringGlow)" opacity="0.15" />

  <defs>
    <radialGradient id="ringGlow" cx="40%" cy="30%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>
</svg>
